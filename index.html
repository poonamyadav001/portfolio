 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
        <!-- Main Container -->
        <div class="container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>Quick Actions</h3>
                    <button class="quick-action" id="addTaskBtn">➕ New Task</button>
                    <button class="quick-action" id="goalBtn">🎯 Set Goal</button>
                </div>

                <div class="sidebar-section">
                    <h3>Filters</h3>
                    <button class="filter-btn active" data-filter="all">All Tasks</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                    <button class="filter-btn" data-filter="pinned">📌 Pinned</button>
                </div>

                <div class="sidebar-section">
                    <h3>Categories</h3>
                    <button class="category-btn active" data-category="all">All</button>
                    <button class="category-btn" data-category="Study">📚 Study</button>
                    <button class="category-btn" data-category="Work">💼 Work</button>
                    <button class="category-btn" data-category="Personal">👤 Personal</button>
                    <button class="category-btn" data-category="Health">🏃 Health</button>
                    <button class="category-btn" data-category="Shopping">🛒 Shopping</button>
                </div>

                <div class="sidebar-section">
                    <h3>Priorities</h3>
                    <button class="priority-btn" data-priority="all">All Priorities</button>
                    <button class="priority-btn high" data-priority="High">🔴 High</button>
                    <button class="priority-btn medium" data-priority="Medium">🟡 Medium</button>
                    <button class="priority-btn low" data-priority="Low">🟢 Low</button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Progress Bar -->
                <div class="progress-section">
                    <div class="progress-info">
                        <span id="progressLabel">Progress</span>
                        <span id="progressPercentage">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progressFill" class="progress-fill"></div>
                    </div>
                </div>

                <!-- Input Section -->
                <div class="task-input-section">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="taskInput" 
                            placeholder="What needs to be done?" 
                            class="task-input"
                        >
                    </div>
                    <div class="task-options">
                        <select id="categorySelect" class="select-input" aria-label="Task category">
                            <option value="Personal">Personal</option>
                            <option value="Work">Work</option>
                            <option value="Study">Study</option>
                            <option value="Health">Health</option>
                            <option value="Shopping">Shopping</option>
                        </select>
                        <select id="prioritySelect" class="select-input" aria-label="Task priority">
                            <option value="Medium">Medium Priority</option>
                            <option value="High">High Priority</option>
                            <option value="Low">Low Priority</option>
                        </select>
                        <input 
                            type="date" 
                            id="deadlineInput" 
                            class="select-input"
                            aria-label="Task deadline"
                        >
                        <select id="recurringSelect" class="select-input" aria-label="Task recurrence">
                            <option value="none">No Repeat</option>
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                        </select>
                    </div>
                    <button id="addBtn" class="add-btn">Add Task</button>
                </div>

                <!-- Search Section -->
                <div class="search-section">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="🔍 Search tasks..." 
                        class="search-input"
                    >
                </div>

                <!-- Tasks Container -->
                <div id="tasksContainer" class="tasks-container">
                    <ul id="taskList" class="task-list">
                        <!-- Tasks will be added here -->
                    </ul>
                </div>

                <!-- Empty State -->
                <div class="empty-state" id="emptyState">
                    <p>🎉 No tasks! Time to relax or add a new task.</p>
                </div>
            </main>
        </div>

        <!-- Modal for Task Details -->
        <div id="taskModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Task Details</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Task Name</label>
                        <input type="text" id="modalTaskName" class="form-input" placeholder="Enter task name" title="Task Name">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="modalTaskDesc" class="form-input" placeholder="Enter task description" title="Task Description"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="modalCategory" class="form-input" title="Category">
                            <option value="Personal">Personal</option>
                            <option value="Work">Work</option>
                            <option value="Study">Study</option>
                            <option value="Health">Health</option>
                            <option value="Shopping">Shopping</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select id="modalPriority" class="form-input" title="Priority">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Deadline</label>
                        <input type="date" id="modalDeadline" class="form-input" title="Deadline" placeholder="Select deadline">
                    </div>
                    <div class="form-group">
                        <label>Subtasks</label>
                        <div id="subtasksList"></div>
                        <input type="text" id="newSubtask" placeholder="Add subtask..." class="form-input">
                        <button id="addSubtaskBtn" class="form-btn">Add Subtask</button>
                    </div>
                    <div class="form-group">
                        <label for="modalReminder">Reminders</label>
                        <select id="modalReminder" class="form-input" aria-label="Reminder settings">
                            <option value="none">No Reminder</option>
                            <option value="5min">5 minutes before</option>
                            <option value="15min">15 minutes before</option>
                            <option value="1hour">1 hour before</option>
                            <option value="1day">1 day before</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="saveTaskBtn" class="form-btn primary">Save Task</button>
                    <button id="closeModalBtn" class="form-btn">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Modal for Statistics -->
        <div id="statsModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>📊 Statistics & Goals</h2>
                    <button class="close-btn">&times;</button>
                </div>
                <div class="modal-body stats-modal">
                    <div class="stat-item">
                        <h3>Total Tasks</h3>
                        <p id="statTotal">0</p>
                    </div>
                    <div class="stat-item">
                        <h3>Completed</h3>
                        <p id="statCompleted">0</p>
                    </div>
                    <div class="stat-item">
                        <h3>Remaining</h3>
                        <p id="statRemaining">0</p>
                    </div>
                    <div class="stat-item">
                        <h3>Completion Rate</h3>
                        <p id="statRate">0%</p>
                    </div>
                    <div class="stat-item">
                        <h3>By Category</h3>
                        <div id="categoryStats"></div>
                    </div>
                    <div class="stat-item">
                        <h3>By Priority</h3>
                        <div id="priorityStats"></div>
                    </div>
                    <div class="goal-section">
                        <h3>🎯 Daily Goal</h3>
                        <div class="goal-input">
                            <input type="number" id="goalInput" placeholder="Tasks to complete today" min="1">
                            <button id="setGoalBtn" class="form-btn primary">Set Goal</button>
                        </div>
                        <p id="goalStatus"></p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="closeStatsBtn" class="form-btn">Close</button>
                </div>
            </div>
        </div>

        <!-- Notification -->
        <div id="notification" class="notification"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
